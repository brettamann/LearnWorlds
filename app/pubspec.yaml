name: critmath
description: CritMath — Phase 1 Flutter app. K–2 math educational game targeting iPad.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management — see specs/shared/project-bootstrap.md
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Immutable models + JSON ser/de
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Boot-time schema validation (debug only)
  json_schema: ^5.1.1

  # Audio
  just_audio: ^0.9.39

  # Storage
  path_provider: ^2.1.3
  path: ^1.9.0

  # Handwriting classifier
  tflite_flutter: ^0.10.4

  # Share sheet
  share_plus: ^9.0.0

  # Animation
  rive: ^0.13.4
  lottie: ^3.1.2

  # Utilities
  logger: ^2.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code-gen
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Test mocks
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  # Bundled data (read at boot)
  assets:
    - ../data/concept-registry/
    - ../data/activity-registry/
    - ../data/reward-catalog/
    - ../data/telemetry-catalog/
    - ../data/standards-reference/
    - ../data/lesson-runtime/
    - ../data/slot-vocabulary/
    - ../content/strings/en-US/activities/
    # Art + audio assets will be added as Phase 0 style lock completes:
    # - ../assets/

  # Fonts
  fonts: []
