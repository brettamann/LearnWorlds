name: critmath
description: CritMath — Phase 1 Flutter app. K–2 math educational game targeting iPad.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management — see specs/shared/project-bootstrap.md
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Immutable models + JSON ser/de
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Boot-time schema validation (debug only)
  json_schema: ^5.1.1

  # Audio (plays pre-rendered narration files when they exist)
  just_audio: ^0.9.39

  # System TTS — fallback for un-rendered narration cues (text-and-tts-deferral.md).
  # During the deferral period, this is the only audio path (caption + system TTS).
  # Once ElevenLabs renders happen, this becomes the safety net for cueIds without files.
  flutter_tts: ^4.0.2

  # Storage
  path_provider: ^2.1.3
  path: ^1.9.0
  # Cross-platform key-value store for SaveCoordinator. Web uses localStorage,
  # mobile uses platform-native prefs. Sprint 1 vertical slice persistence.
  shared_preferences: ^2.3.0

  # Handwriting classifier
  tflite_flutter: ^0.10.4

  # Share sheet
  share_plus: ^9.0.0

  # Animation
  rive: ^0.13.4
  lottie: ^3.1.2

  # Utilities
  logger: ^2.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code-gen
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Test mocks
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  # Bundled data (read at boot). Mirrored from repo-root data/ + content/
  # via scripts/sync-assets.ps1 (re-run after editing those source trees).
  # `..` paths break Flutter web's URL normalization at runtime, so we mirror
  # the trees under assets/ and reference them locally.
  assets:
    - assets/data/concept-registry/
    - assets/data/activity-registry/
    - assets/data/reward-catalog/
    - assets/data/telemetry-catalog/
    - assets/data/standards-reference/
    - assets/data/lesson-runtime/
    - assets/data/slot-vocabulary/
    - assets/content/strings/en-US/activities/
    # Placeholder art (will be replaced with official assets per
    # specs/shared/art-direction.md; structure per specs/shared/asset-paths.md).
    - assets/activities/counting-parade/sprites/
    - assets/activities/counting-parade/backgrounds/
    - assets/activities/ten-frame-pond/sprites/
    - assets/shared/region-characters/sanctuary/
    - assets/shared/ui/
    - assets/maps/
    # Art + audio assets will be added as Phase 0 style lock completes:
    # - ../assets/

  # Fonts
  fonts: []
